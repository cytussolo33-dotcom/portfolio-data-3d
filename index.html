<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orixinet</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>ORIXINET</h1>
  <a onclick="whatsapp()" class="btn">WhatsApp</a>
</header>

<section class="hero">
  <div class="hero-text">
    <span class="tag">INTERNET FIBRA ÓPTICA</span>
    <h2>INTERNET RÁPIDA,<br>ESTÁVEL E <span>SEM DOR DE CABEÇA!</span></h2>
    <p>Conexão 100% fibra óptica para você jogar, trabalhar e estudar.</p>
    
    <button onclick="whatsapp()" class="btn-main">
      QUERO CONTRATAR
    </button>
  </div>

  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f">
  </div>
</section>

<section class="planos">
  <h2>PLANOS</h2>

  <div class="cards">
    <div class="card">
      <h3>200 MEGA</h3>
      <p>R$ 99,90</p>
      <button onclick="whatsapp()">ASSINAR</button>
    </div>

    <div class="card destaque">
      <h3>400 MEGA</h3>
      <p>R$ 129,90</p>
      <button onclick="whatsapp()">ASSINAR</button>
    </div>

    <div class="card">
      <h3>600 MEGA</h3>
      <p>R$ 149,90</p>
      <button onclick="whatsapp()">ASSINAR</button>
    </div>

    <div class="card">
      <h3>800 MEGA</h3>
      <p>R$ 179,90</p>
      <button onclick="whatsapp()">ASSINAR</button>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Orixinet</p>
</footer>

<script src="script.js"></script>
</body>
</html>
